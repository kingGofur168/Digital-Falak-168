<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Me - Saweria Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d1117;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #c9d1d9;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Profile Section */
        .profile-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 3px solid #30363d;
            font-size: 48px;
            color: white;
        }

        .username {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #f0f6fc;
        }

        .bio {
            font-size: 16px;
            color: #8b949e;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #f0f6fc;
        }

        .stat-label {
            font-size: 14px;
            color: #8b949e;
        }

        /* Support Card */
        .support-card {
            background: linear-gradient(135deg, #161b22 0%, #21262d 100%);
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .support-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            text-align: center;
            color: #f0f6fc;
        }

        .amount-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .amount-btn {
            padding: 14px;
            background-color: #21262d;
            border: 1px solid #30363d;
            border-radius: 10px;
            color: #c9d1d9;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: center;
        }

        .amount-btn:hover {
            background-color: #30363d;
            border-color: #58a6ff;
            color: #58a6ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.2);
        }

        .amount-btn.active {
            background-color: #1f6feb22;
            border-color: #1f6feb;
            color: #58a6ff;
        }

        .custom-amount {
            margin-bottom: 24px;
        }

        .custom-amount label {
            display: block;
            margin-bottom: 8px;
            color: #8b949e;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .currency-symbol {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #8b949e;
            font-size: 18px;
            font-weight: 600;
        }

        .amount-input {
            width: 100%;
            padding: 14px 16px 14px 40px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            color: #c9d1d9;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .amount-input:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        .message-input {
            width: 100%;
            padding: 14px 16px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            color: #c9d1d9;
            font-size: 14px;
            margin-bottom: 24px;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .message-input:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        .message-input::placeholder {
            color: #484f58;
        }

        .support-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .support-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .support-btn:active {
            transform: translateY(0);
        }

        /* Payment Methods */
        .payment-methods {
            margin-top: 30px;
            text-align: center;
        }

        .payment-title {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 16px;
        }

        .payment-icons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .payment-icon {
            width: 50px;
            height: 50px;
            background-color: #21262d;
            border: 1px solid #30363d;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #8b949e;
            transition: all 0.3s ease;
        }

        .payment-icon:hover {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        /* Social Links */
        .social-links {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 20px;
        }

        .social-link {
            width: 40px;
            height: 40px;
            background-color: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8b949e;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 18px;
        }

        .social-link:hover {
            border-color: #58a6ff;
            color: #58a6ff;
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .support-card {
                padding: 24px;
            }
            
            .amount-options {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            
            .amount-btn {
                padding: 12px;
                font-size: 14px;
            }
            
            .username {
                font-size: 24px;
            }
        }

        /* Success Message */
        .success-message {
            display: none;
            background-color: #238636;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Profile Section -->
        <div class="profile-section">
            <div class="avatar">
                <i class="fas fa-user"></i>
            </div>
            <h1 class="username">Creator Name</h1>
            <p class="bio">Konten kreator yang passionate dalam membuat konten digital. Support karya saya untuk terus berkarya! 🚀</p>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value">127</div>
                    <div class="stat-label">Supporter</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">Rp 5.2M</div>
                    <div class="stat-label">Terkumpul</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">89%</div>
                    <div class="stat-label">Progress</div>
                </div>
            </div>

            <div class="social-links">
                <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-link"><i class="fab fa-youtube"></i></a>
                <a href="#" class="social-link"><i class="fab fa-tiktok"></i></a>
                <a href="#" class="social-link"><i class="fab fa-discord"></i></a>
                <a href="#" class="social-link"><i class="fab fa-twitter"></i></a>
            </div>
        </div>

        <!-- Support Card -->
        <div class="support-card">
            <h2 class="support-title">
                <i class="fas fa-heart" style="color: #f85149;"></i> Support Saya
            </h2>
            
            <div class="amount-options">
                <button class="amount-btn" onclick="setAmount(10000)">Rp 10K</button>
                <button class="amount-btn" onclick="setAmount(25000)">Rp 25K</button>
                <button class="amount-btn" onclick="setAmount(50000)">Rp 50K</button>
                <button class="amount-btn" onclick="setAmount(100000)">Rp 100K</button>
                <button class="amount-btn" onclick="setAmount(250000)">Rp 250K</button>
                <button class="amount-btn" onclick="setAmount(500000)">Rp 500K</button>
            </div>

            <div class="custom-amount">
                <label>Atau masukkan nominal custom:</label>
                <div class="input-wrapper">
                    <span class="currency-symbol">Rp</span>
                    <input type="number" class="amount-input" id="customAmount" placeholder="Masukkan nominal..." min="1000" onchange="updateAmount(this.value)">
                </div>
            </div>

            <textarea class="message-input" id="message" placeholder="Tulis pesan support kamu... (opsional)"></textarea>

            <button class="support-btn" onclick="processSupport()">
                <i class="fas fa-hand-holding-heart"></i>
                Support Sekarang
            </button>

            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i> Terima kasih atas supportnya! 💜
            </div>
        </div>

        <!-- Payment Methods -->
        <div class="payment-methods">
            <p class="payment-title">Metode Pembayaran Tersedia</p>
            <div class="payment-icons">
                <div class="payment-icon" title="Bank Transfer">
                    <i class="fas fa-university"></i>
                </div>
                <div class="payment-icon" title="GoPay">
                    <i class="fas fa-wallet"></i>
                </div>
                <div class="payment-icon" title="OVO">
                    <i class="fas fa-mobile-alt"></i>
                </div>
                <div class="payment-icon" title="DANA">
                    <i class="fas fa-credit-card"></i>
                </div>
                <div class="payment-icon" title="QRIS">
                    <i class="fas fa-qrcode"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedAmount = 0;

        function setAmount(amount) {
            // Remove active class from all buttons
            document.querySelectorAll('.amount-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Add active class to clicked button
            event.target.classList.add('active');
            
            // Update selected amount
            selectedAmount = amount;
            document.getElementById('customAmount').value = '';
            
            // Show selected amount
            console.log('Selected: Rp ' + amount.toLocaleString('id-ID'));
        }

        function updateAmount(value) {
            if (value) {
                // Remove active class from preset buttons
                document.querySelectorAll('.amount-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                selectedAmount = parseInt(value);
            }
        }

        function processSupport() {
            const customInput = document.getElementById('customAmount').value;
            const message = document.getElementById('message').value;
            
            if (!selectedAmount && !customInput) {
                alert('Silakan pilih atau masukkan nominal support!');
                return;
            }

            const finalAmount = customInput ? parseInt(customInput) : selectedAmount;
            
            if (finalAmount < 1000) {
                alert('Minimal support Rp 1.000');
                return;
            }

            // Show success message
            const successMsg = document.getElementById('successMessage');
            successMsg.style.display = 'block';
            
            // Simulate payment processing
            console.log('Processing support:');
            console.log('Amount: Rp ' + finalAmount.toLocaleString('id-ID'));
            console.log('Message: ' + (message || 'No message'));
            
            // Hide success message after 3 seconds
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);
            
            // Here you would typically integrate with payment gateway
            // window.location.href = 'payment-gateway-url?amount=' + finalAmount;
        }

        // Add some interactivity
        document.querySelectorAll('.amount-btn').forEach(btn => {
            btn.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-2px)';
            });
            
            btn.addEventListener('mouseleave', function() {
                if (!this.classList.contains('active')) {
                    this.style.transform = 'translateY(0)';
                }
            });
        });
    </script>
</body>
</html>
